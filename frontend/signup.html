<!DOCTYPE html>
<html lang="en" class="auth-page">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - StudyPrep AI</title>
    <meta name="description"
        content="Create your StudyPrep AI account to access AI-powered study tools, notes generator, exam planner, and more.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body>

    <div class="auth-bg"></div>

    <!-- Signup Form -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="home.html" class="auth-logo">StudyPrep AI</a>
                <h2>Create Account</h2>
                <p>Start your smart study journey today</p>
            </div>

            <div id="authMessage" class="auth-message"></div>

            <form id="signupForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="Enter your full name" autocomplete="name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Create a strong password"
                            autocomplete="new-password" required>
                        <button type="button" class="password-toggle"
                            aria-label="Toggle password visibility">👁️</button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill"></div>
                        </div>
                        <span class="strength-text"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password"
                            autocomplete="new-password" required>
                        <button type="button" class="password-toggle"
                            aria-label="Toggle password visibility">👁️</button>
                    </div>
                </div>

                <div class="terms-check">
                    <input type="checkbox" id="terms">
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy
                            Policy</a></label>
                </div>

                <button type="submit" class="auth-submit">Create Account</button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
