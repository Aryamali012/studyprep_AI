<!DOCTYPE html>
<html lang="en" class="auth-page">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyPrep AI</title>
    <meta name="description"
        content="Sign in to StudyPrep AI to access your personalized study tools, notes, and exam preparation resources.">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body>

    <div class="auth-bg"></div>

    <!-- Login Form -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <a href="home.html" class="auth-logo">StudyPrep AI</a>
                <h2>Welcome Back</h2>
                <p>Sign in to continue your learning journey</p>
            </div>

            <div id="authMessage" class="auth-message"></div>

            <form id="loginForm" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password"
                            autocomplete="current-password" required>
                        <button type="button" class="password-toggle"
                            aria-label="Toggle password visibility">Show</button>
                    </div>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" id="remember"> Remember me
                    </label>
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="auth-submit">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
</body>

</html>
