<form onsubmit="generateNotes(event)">
  <input id="topic" placeholder="Enter topic" required />
  <button type="submit">Generate Notes</button>
</form>

<hr />

<pre id="output" style="white-space: pre-wrap; font-family: inherit;"></pre>

<a id="downloadBtn" style="display:none;" target="_blank">
  📄 Download PDF
</a>

<script>
async function generateNotes(e) {
  e.preventDefault();

  const topic = document.getElementById("topic").value;
  document.getElementById("output").innerText = "Generating notes...";
  document.getElementById("downloadBtn").style.display = "none";

  const res = await fetch("http://127.0.0.1:8000/notes/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ topic })
  });

  const data = await res.json();

  document.getElementById("output").innerText = data.notes;

  const btn = document.getElementById("downloadBtn");
  btn.href = data.pdf_url;
  btn.style.display = "inline-block";

}
</script>
